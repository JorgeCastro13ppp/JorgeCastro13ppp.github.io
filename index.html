<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Luanilla la gordilla 💖</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
      color: white;
    }

    .card {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 420px;
      padding: 35px 25px;
      text-align: center;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 28px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(255, 70, 120, 0.35);
      animation: aparecer 1.2s ease;
    }

    h1 {
      font-size: 2.3rem;
      margin-bottom: 15px;
      text-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .btn {
      border: none;
      padding: 15px 28px;
      font-size: 1.05rem;
      font-weight: bold;
      color: #ff4f8b;
      background: white;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(255, 60, 120, 0.35);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 15px 35px rgba(255, 60, 120, 0.5);
    }

    .heart {
      position: absolute;
      bottom: -40px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 24px;
      animation: subir linear infinite;
      user-select: none;
      pointer-events: none;
    }

    @keyframes subir {
      0% {
        transform: translateY(0) scale(1) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) scale(1.8) rotate(360deg);
        opacity: 0;
      }
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Para Luanilla la gordilla más bella 💖</h1>
    <p>
      Hola mi amor, hice esta pequeña sorpresa para ti.<br />
      Pulsa el botón y mira lo que preparé con mucho cariño.
    </p>
    <button class="btn" onclick="abrirVideo()">Ver sorpresa 💌</button>
  </div>

  <script>
    // Cambia este enlace por el video que quieras enviarle
    const enlaceVideo = "https://www.youtube.com/shorts/8-82XfUGG-0";

    function abrirVideo() {
      window.location.href = enlaceVideo;
    }

    function crearCorazon() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = Math.random() * 25 + 18 + "px";
      heart.style.animationDuration = Math.random() * 4 + 4 + "s";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 8000);
    }

    setInterval(crearCorazon, 300);
  </script>
</body>
</html>
